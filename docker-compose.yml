version: "3.9"

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file: .env
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    restart: unless-stopped

  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod
